services:
  db:
    image: mysql:8.4
    container_name: hypeculture-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hypeculture_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/opt/hypeculture/sql:ro
      - ./docker/mysql/init/00-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: hypeculture-backend
    environment:
      DB_URL: jdbc:mysql://db:3306/hypeculture_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: hypeculture-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
